name: Scrape ICPC News

on:
  schedule:
    - cron: "0 6 * * *"   # once daily, 6am UTC — change to "0 */6 * * *" for every 6h
  workflow_dispatch:        # lets you trigger it manually from the Actions tab

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm run scrape
      - name: Commit updated news.json
        run: |
          git config user.name "news-bot"
          git config user.email "news-bot@users.noreply.github.com"
          git add data/news.json
          git diff --staged --quiet || git commit -m "chore: update news feed [skip ci]"
          git push